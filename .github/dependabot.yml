version: 2
updates:
  # Keep the SHA-pinned GitHub Actions fresh: Dependabot opens a PR when a
  # pinned action has a newer release, updating the SHA and the version comment.
  # CI runs on the PR (pull_request trigger), so the bump is validated before merge.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      # One combined PR for all action bumps instead of one per action.
      github-actions:
        patterns:
          - "*"

  # Keep the app's Gradle dependencies (AndroidX, Compose, Kotlin, AGP, ...)
  # current. Dependabot reads gradle/libs.versions.toml; the shared `kotlin`
  # version ref keeps the Kotlin plugins bumped together.
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    open-pull-requests-limit: 5
    groups:
      # Bundle low-risk minor/patch bumps into one PR; majors (which may have
      # breaking changes) come as their own PRs so they're reviewed in isolation.
      gradle-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
