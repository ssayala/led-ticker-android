version: 2
updates:
  # Keep the SHA-pinned GitHub Actions fresh: Dependabot opens a PR when a
  # pinned action has a newer release, updating the SHA and the version comment.
  # CI runs on the PR (pull_request trigger), so the bump is validated before merge.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      # One combined PR for all action bumps instead of one per action.
      github-actions:
        patterns:
          - "*"
